name: Build macOS Only

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'zulu'

      - uses: gradle/actions/setup-gradle@v3

      - name: Clean & Build Desktop App (macOS)
        run: ./gradlew clean :composeApp:packageDistributionForCurrentOS

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App-macOS-dmg
          path: composeApp/build/compose/binaries/main/dmg/*.dmg
          if-no-files-found: error

      - name: Upload PKG
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App-macOS-pkg
          path: composeApp/build/compose/binaries/main/pkg/*.pkg
          if-no-files-found: error
