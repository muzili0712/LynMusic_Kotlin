name: Build macOS Only

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build-macos:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21.0.9'
          distribution: 'oracle'

      - uses: gradle/actions/setup-gradle@v3

      - name: Clean & Build Desktop App (macOS)
        run: ./gradlew clean :composeApp:packageDistributionForCurrentOS

      - name: Upload macOS Artifact
        uses: actions/upload-artifact@v4
        with:
          name: Desktop-App-macOS
          path: composeApp/build/compose/binaries/**
          if-no-files-found: error
